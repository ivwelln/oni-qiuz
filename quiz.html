<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Зачёт: Основы НИ</title>
<style>

:root{--bg:#f1f5f9;--card:#fff;--primary:#3b5bdb;--pd:#2f4ac0;--correct:#2f9e44;--cbg:#ebfbee;--wrong:#e03131;--wbg:#fff5f5;--missed:#1971c2;--mbg:#e7f5ff;--text:#1e293b;--muted:#64748b;--bdr:#e2e8f0;--sh:0 2px 16px rgba(0,0,0,.08);--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{max-width:800px;margin:0 auto;padding:20px 16px 60px}
.start-hero{background:var(--primary);color:#fff;border-radius:var(--r);padding:36px 30px 32px;margin-bottom:20px;text-align:center}
.start-hero h1{font-size:1.65rem;font-weight:700;margin-bottom:8px}
.start-hero p{opacity:.85;font-size:.98rem}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin:16px 0 20px}
.topic-btn{background:var(--card);border:2px solid var(--bdr);border-radius:10px;padding:12px;cursor:pointer;text-align:left;font-size:.86rem;color:var(--text);transition:all .18s;font-family:inherit;line-height:1.4}
.topic-btn:hover{border-color:var(--primary);color:var(--primary)}
.topic-btn.active{border-color:var(--primary);background:#eef2ff;color:var(--primary);font-weight:600}
.topic-btn .tc{font-size:.74rem;color:var(--muted);display:block;margin-top:3px}
.start-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:4px}
.btn-primary{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:13px 30px;font-size:.98rem;font-weight:600;cursor:pointer;transition:background .18s;font-family:inherit}
.btn-primary:hover{background:var(--pd)}
.btn-secondary{background:#fff;color:var(--primary);border:2px solid var(--primary);border-radius:10px;padding:11px 22px;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit}
.btn-secondary:hover{background:#eef2ff}
.stat-bar{background:var(--card);border-radius:var(--r);padding:14px 20px;margin-bottom:18px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap;box-shadow:var(--sh)}
.stat-item{text-align:center}
.stat-val{font-size:1.5rem;font-weight:700;color:var(--primary)}
.stat-lbl{font-size:.76rem;color:var(--muted)}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.progress-text{font-size:.88rem;color:var(--muted);font-weight:500}
.score-display{font-size:.88rem;font-weight:600;color:var(--primary)}
.pb-wrap{background:var(--bdr);border-radius:99px;height:6px;margin-bottom:4px;overflow:hidden}
.pb-fill{background:var(--primary);height:100%;border-radius:99px;transition:width .4s}
.topic-badge{display:inline-block;background:#eef2ff;color:var(--primary);font-size:.76rem;font-weight:600;border-radius:99px;padding:3px 12px;margin-bottom:10px}
.streak-badge{display:inline-block;background:#fff9db;color:#e67700;font-size:.76rem;font-weight:600;border-radius:99px;padding:3px 12px;margin-bottom:10px;margin-left:6px}
.type-badge{display:inline-block;background:#f3f0ff;color:#7048e8;font-size:.73rem;font-weight:600;border-radius:99px;padding:2px 10px;margin-bottom:10px;margin-left:6px}
.question-card{background:var(--card);border-radius:var(--r);padding:26px 26px 22px;box-shadow:var(--sh);margin-bottom:12px}
.question-text{font-size:1.07rem;font-weight:600;line-height:1.5;margin-bottom:18px}
/* SINGLE */
.options{display:flex;flex-direction:column;gap:9px}
.option-btn{background:var(--bg);border:2px solid var(--bdr);border-radius:10px;padding:12px 14px;text-align:left;cursor:pointer;font-size:.93rem;font-family:inherit;color:var(--text);transition:all .15s;display:flex;align-items:flex-start;gap:9px;line-height:1.4}
.option-btn:hover:not(:disabled){border-color:var(--primary);background:#f8f9ff}
.option-btn:disabled{cursor:default}
.option-btn.correct{border-color:var(--correct);background:var(--cbg);color:var(--correct);font-weight:600}
.option-btn.wrong{border-color:var(--wrong);background:var(--wbg);color:var(--wrong)}
.key-hint{background:var(--bdr);color:var(--muted);border-radius:5px;width:22px;height:22px;min-width:22px;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;margin-top:1px;flex-shrink:0}
.option-btn.correct .key-hint{background:var(--correct);color:#fff}
.option-btn.wrong .key-hint{background:var(--wrong);color:#fff}
/* MULTI */
.multi-opts{display:flex;flex-direction:column;gap:9px}
.multi-opt{background:var(--bg);border:2px solid var(--bdr);border-radius:10px;padding:12px 14px;text-align:left;cursor:pointer;font-size:.93rem;font-family:inherit;color:var(--text);transition:all .15s;display:flex;align-items:flex-start;gap:9px;line-height:1.4}
.multi-opt:hover:not(:disabled){border-color:var(--primary);background:#f8f9ff}
.multi-opt.selected{border-color:var(--primary);background:#eef2ff}
.multi-opt:disabled{cursor:default}
.multi-opt.correct{border-color:var(--correct);background:var(--cbg);color:var(--correct);font-weight:600}
.multi-opt.wrong{border-color:var(--wrong);background:var(--wbg);color:var(--wrong)}
.multi-opt.missed{border-color:var(--missed);background:var(--mbg);color:var(--missed)}
.chk{width:20px;height:20px;min-width:20px;border:2px solid var(--bdr);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;margin-top:1px;transition:all .15s}
.multi-opt.selected .chk{border-color:var(--primary);background:var(--primary);color:#fff}
.multi-opt.correct .chk{border-color:var(--correct);background:var(--correct);color:#fff}
.multi-opt.wrong .chk{border-color:var(--wrong);background:var(--wrong);color:#fff}
.multi-opt.missed .chk{border-color:var(--missed);background:var(--missed);color:#fff}
/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-col-h{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:4px 2px}
.match-term,.match-def{border:2px solid var(--bdr);border-radius:9px;padding:10px 12px;font-size:.88rem;line-height:1.4;cursor:pointer;transition:all .15s;background:var(--bg);display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:48px}
.match-term:hover,.match-def:hover{border-color:var(--primary)}
.match-term.active{border-color:var(--primary);background:#eef2ff;box-shadow:0 0 0 3px rgba(59,91,219,.15)}
.match-badge{border-radius:99px;padding:2px 8px;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}
.match-hint{text-align:center;font-size:.83rem;color:var(--primary);margin-top:10px;font-style:italic}
.match-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;justify-content:center;font-size:.8rem;color:var(--muted)}
/* FEEDBACK + NEXT */
.feedback-box{border-radius:10px;padding:11px 14px;font-size:.88rem;line-height:1.5;margin-top:8px}
.feedback-box.correct{background:var(--cbg);color:var(--correct);border:1px solid #b2f2bb}
.feedback-box.wrong{background:var(--wbg);color:var(--wrong);border:1px solid #ffc9c9}
.feedback-box.partial{background:#fff9db;color:#815900;border:1px solid #ffe066}
.multi-legend{font-size:.78rem;margin-top:10px;display:flex;gap:14px;flex-wrap:wrap;color:var(--muted)}
.btn-verify,.btn-next{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:11px 24px;font-size:.93rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .18s;margin-top:12px}
.btn-verify:hover,.btn-next:hover{background:var(--pd)}
.next-wrap{display:flex;justify-content:flex-end}
.hint-text{text-align:center;color:var(--muted);font-size:.78rem;margin-top:8px}
/* RESULT */
.result-hero{background:var(--primary);color:#fff;border-radius:var(--r);padding:34px 30px;text-align:center;margin-bottom:18px}
.result-score{font-size:3.2rem;font-weight:800;line-height:1}
.result-lbl{font-size:.95rem;opacity:.85;margin-top:6px}
.result-grade{font-size:1.15rem;font-weight:700;margin-top:10px}
.topic-stats{background:var(--card);border-radius:var(--r);padding:18px 22px;margin-bottom:14px;box-shadow:var(--sh)}
.topic-stats h3{font-size:.88rem;color:var(--muted);margin-bottom:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.ts-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ts-name{font-size:.86rem;min-width:88px}
.ts-bar-wrap{flex:1;background:var(--bdr);border-radius:99px;height:9px;overflow:hidden}
.ts-bar{height:100%;border-radius:99px;transition:width .6s}
.ts-bar.bad{background:var(--wrong)}
.ts-bar.ok{background:#f59f00}
.ts-bar.good{background:var(--correct)}
.ts-pct{font-size:.8rem;font-weight:600;min-width:36px;text-align:right;color:var(--muted)}
.wrong-list{background:var(--card);border-radius:var(--r);padding:18px 22px;margin-bottom:18px;box-shadow:var(--sh)}
.wrong-list h3{font-size:.88rem;color:var(--muted);margin-bottom:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.wrong-item{padding:9px 0;border-bottom:1px solid var(--bdr);font-size:.86rem}
.wrong-item:last-child{border-bottom:none}
.wrong-item .wq{font-weight:600;margin-bottom:2px}
.wrong-item .wa{color:var(--correct)}
.wrong-item .wb{color:var(--wrong)}
.result-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
/* ── Hover only on pointer devices ── */
@media(hover:none){
  .option-btn:hover:not(:disabled),.multi-opt:hover:not(:disabled),
  .topic-btn:hover,.match-term:hover,.match-def:hover,
  .btn-primary:hover,.btn-secondary:hover,.btn-verify:hover,.btn-next:hover{
    background:revert;border-color:revert;color:revert}
}
/* ── Mobile ── */
@media(max-width:600px){
  #app{padding:10px 10px 80px}
  .start-hero{padding:22px 14px 18px;border-radius:12px}
  .start-hero h1{font-size:1.25rem}
  .start-hero p{font-size:.88rem}
  .topics-grid{grid-template-columns:1fr 1fr;gap:8px;margin:12px 0 16px}
  .topic-btn{padding:10px 9px;font-size:.82rem}
  .start-actions{flex-direction:column;gap:8px}
  .btn-primary,.btn-secondary{width:100%;text-align:center;padding:14px;font-size:1rem;border-radius:12px}
  .stat-bar{gap:10px 16px;padding:10px 12px}
  .stat-val{font-size:1.2rem}
  .stat-lbl{font-size:.7rem}
  .question-card{padding:14px 12px 12px;border-radius:12px;margin-bottom:10px}
  .question-text{font-size:.95rem;margin-bottom:14px;line-height:1.55}
  .topic-badge,.streak-badge,.type-badge{font-size:.68rem;padding:2px 8px;margin-bottom:8px}
  .option-btn,.multi-opt{padding:13px 11px;font-size:.9rem;min-height:50px;border-radius:9px}
  .key-hint{display:none}
  .hint-text{display:none}
  .match-col-h{font-size:.72rem;padding:2px 1px}
  .match-term,.match-def{padding:8px;font-size:.8rem;min-height:44px;line-height:1.35;border-radius:8px}
  .match-badge{font-size:.68rem;padding:1px 6px}
  .match-hint{font-size:.78rem;margin-top:8px}
  .btn-verify,.btn-next{width:100%;padding:14px;font-size:.97rem;border-radius:10px;margin-top:10px;display:block}
  .next-wrap{justify-content:stretch}
  .feedback-box{font-size:.84rem;padding:10px 12px}
  .multi-legend{font-size:.74rem;gap:10px}
  .quiz-header{gap:4px}
  .progress-text,.score-display{font-size:.82rem}
  .result-hero{padding:22px 14px;border-radius:12px}
  .result-score{font-size:2.5rem}
  .result-lbl{font-size:.88rem}
  .result-grade{font-size:1rem}
  .result-actions{flex-direction:column;gap:8px}
  .result-actions .btn-primary,.result-actions .btn-secondary{width:100%}
  .topic-stats,.wrong-list{padding:14px 12px}
  .ts-name{min-width:60px;font-size:.78rem}
}
/* iPhone safe-area */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  #app{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
}

</style>
</head>

const PAIR_COLORS=['#4263eb','#2f9e44','#e67700','#c92a2a','#1098ad','#9c36b5'];
const PAIR_BG=['#edf2ff','#ebfbee','#fff9db','#fff5f5','#e3fafc','#f3d9fa'];

const TOPICS=[
  {id:'all',name:'Все темы',count:0},
  ...[...new Set(Q.map(q=>q.t))].map(t=>({
    id:t,name:Q.find(q=>q.t===t).tf,count:Q.filter(q=>q.t===t).length
  }))
];
TOPICS[0].count=Q.length;

let state={screen:'start',questions:[],qIndex:0,answered:false,selected:null,
  score:0,wrong:[],topicFilter:'all',streak:0,maxStreak:0};

let gStats=JSON.parse(localStorage.getItem('qs')||'{}');

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function prepareQuestions(pool){
  return shuffle(pool).map(q=>{
    if(!q.type||q.type==='single'){
      const ct=q.o[q.c];const sh=shuffle(q.o);
      return {...q,o:sh,c:sh.indexOf(ct)};
    }
    if(q.type==='multi'){
      const cts=q.correct.map(i=>q.o[i]);const sh=shuffle(q.o);
      return {...q,o:sh,correct:cts.map(t=>sh.indexOf(t)),_sel:new Set(),_checked:false};
    }
    if(q.type==='match'){
      const n=q.pairs.length;
      return {...q,_sd:shuffle([...Array(n).keys()]),_p:{},_at:null,_checked:false};
    }
    return q;
  });
}

function startQuiz(retryMode){
  let pool;
  if(retryMode){pool=state.wrong.map(i=>state.questions[i]);}
  else{pool=state.topicFilter==='all'?Q:Q.filter(q=>q.t===state.topicFilter);}
  state={...state,questions:prepareQuestions(pool),qIndex:0,answered:false,
    selected:null,score:0,wrong:[],streak:0,maxStreak:0,screen:'quiz'};
  render();
}

function markResult(correct){
  if(correct){state.score++;state.streak++;if(state.streak>state.maxStreak)state.maxStreak=state.streak;}
  else{state.wrong.push(state.qIndex);state.streak=0;}
}

function answerSingle(idx){
  if(state.answered)return;
  state.answered=true;state.selected=idx;
  markResult(idx===state.questions[state.qIndex].c);
  render();
}

function toggleMulti(idx){
  const q=state.questions[state.qIndex];
  if(q._checked)return;
  if(q._sel.has(idx))q._sel.delete(idx);else q._sel.add(idx);
  render();
}

function checkMulti(){
  const q=state.questions[state.qIndex];
  q._checked=true;state.answered=true;
  const cs=new Set(q.correct);
  const ok=q.correct.every(i=>q._sel.has(i))&&[...q._sel].every(i=>cs.has(i));
  markResult(ok);render();
}

function matchClickTerm(ti){
  const q=state.questions[state.qIndex];
  if(q._checked)return;
  q._at=q._at===ti?null:ti;render();
}

function matchClickDef(sp){
  const q=state.questions[state.qIndex];
  if(q._checked||q._at===null)return;
  const di=q._sd[sp];
  for(const k of Object.keys(q._p)){if(q._p[k]===di)delete q._p[k];}
  q._p[q._at]=di;q._at=null;render();
}

function checkMatch(){
  const q=state.questions[state.qIndex];
  q._checked=true;state.answered=true;
  markResult(q.pairs.every((_,i)=>q._p[i]===i));
  render();
}

function next(){
  if(state.qIndex<state.questions.length-1){
    state.qIndex++;state.answered=false;state.selected=null;render();
  } else {
    const pct=Math.round(state.score/state.questions.length*100);
    gStats={lastScore:pct,bestScore:Math.max(gStats.bestScore||0,pct),
      totalRuns:(gStats.totalRuns||0)+1,lastDate:new Date().toLocaleDateString('ru')};
    localStorage.setItem('qs',JSON.stringify(gStats));
    state.screen='result';render();
  }
}

function render(){
  const app=document.getElementById('app');
  if(state.screen==='start')app.innerHTML=renderStart();
  else if(state.screen==='quiz')app.innerHTML=renderQuiz();
  else app.innerHTML=renderResult();
  attachHandlers();
}

function renderStart(){
  const statsH=gStats.lastScore!==undefined?`<div class="stat-bar">
    <div class="stat-item"><div class="stat-val">${gStats.lastScore}%</div><div class="stat-lbl">Последний</div></div>
    <div class="stat-item"><div class="stat-val">${gStats.bestScore}%</div><div class="stat-lbl">Лучший</div></div>
    <div class="stat-item"><div class="stat-val">${gStats.totalRuns}</div><div class="stat-lbl">Попыток</div></div>
  </div>`:'';
  const topicBtns=TOPICS.map(t=>`
    <button class="topic-btn ${state.topicFilter===t.id?'active':''}" data-topic="${t.id}">
      <strong>${t.id==='all'?'Все темы':t.id.replace('Т','Тема ')}</strong>
      <span class="tc">${t.count} вопросов</span>
    </button>`).join('');
  return `<div><div class="start-hero"><h1>📚 Основы научных исследований</h1>
    <p>Одиночный выбор · Мульти-выбор · Соотнесение</p></div>
    ${statsH}<div class="topics-grid">${topicBtns}</div>
    <div class="start-actions">
      <button class="btn-primary" id="btn-start">▶ Начать тест</button>
      ${state.wrong.length>0?`<button class="btn-secondary" id="btn-retry">🔄 Повторить ошибки (${state.wrong.length})</button>`:''}
    </div></div>`;
}

function renderQuiz(){
  const q=state.questions[state.qIndex];
  const tot=state.questions.length;
  const pct=Math.round(state.qIndex/tot*100);
  const typeBadge=q.type==='multi'?'<span class="type-badge">☑ несколько ответов</span>':
    q.type==='match'?'<span class="type-badge">↔ соотнесение</span>':'';
  const streakH=state.streak>=3?`<span class="streak-badge">🔥 Серия: ${state.streak}</span>`:'';
  let bodyH='';
  if(!q.type||q.type==='single'){bodyH=renderSingle(q);}
  else if(q.type==='multi'){bodyH=renderMulti(q);}
  else if(q.type==='match'){bodyH=renderMatch(q);}
  let feedbackH='',nextH='',verifyH='';
  if(state.answered&&(!q.type||q.type==='single')){
    const ok=state.selected===q.c;
    feedbackH=`<div class="feedback-box ${ok?'correct':'wrong'}">${ok?'✅ Правильно!':'❌ Правильный ответ: <strong>'+q.o[q.c]+'</strong>'}</div>`;
    nextH=`<div class="next-wrap"><button class="btn-next" id="btn-next">${state.qIndex<tot-1?'Следующий →':'Завершить'}</button></div>`;
  }
  if(state.answered&&q.type==='multi'){
    const cs=new Set(q.correct);
    const ok=q.correct.every(i=>q._sel.has(i))&&[...q._sel].every(i=>cs.has(i));
    const correctList=q.correct.map(i=>q.o[i]).join(', ');
    feedbackH=`<div class="feedback-box ${ok?'correct':'wrong'}">${ok?'✅ Верно!':'❌ Неверно.'}</div>
      <div class="multi-legend"><span style="color:var(--correct)">✅ выбрано верно</span>
        <span style="color:var(--wrong)">❌ выбрано лишнее</span>
        <span style="color:var(--missed)">🔵 пропущено (нужно было)</span></div>`;
    nextH=`<div class="next-wrap"><button class="btn-next" id="btn-next">${state.qIndex<tot-1?'Следующий →':'Завершить'}</button></div>`;
  }
  if(state.answered&&q.type==='match'){
    const ok=q.pairs.every((_,i)=>q._p[i]===i);
    feedbackH=`<div class="feedback-box ${ok?'correct':'partial'}">${ok?'✅ Все пары верны!':'❌ Есть ошибки. Верные — зелёные, неверные — красные.'}</div>`;
    nextH=`<div class="next-wrap"><button class="btn-next" id="btn-next">${state.qIndex<tot-1?'Следующий →':'Завершить'}</button></div>`;
  }
  return `<div>
    <div class="quiz-header">
      <span class="progress-text">Вопрос ${state.qIndex+1} из ${tot}</span>
      <span class="score-display">✓ ${state.score} / ${state.qIndex}</span>
    </div>
    <div class="pb-wrap"><div class="pb-fill" style="width:${pct}%"></div></div><br>
    <span class="topic-badge">${q.tf}</span>${typeBadge}${streakH}
    <div class="question-card">
      <div class="question-text">${q.q}</div>
      ${bodyH}${feedbackH}
    </div>
    ${nextH}
    <div class="hint-text">Клавиши: <strong>1–4</strong> выбор ответа &nbsp;·&nbsp; <strong>Пробел / Enter</strong> далее</div>
  </div>`;
}

function renderSingle(q){
  return '<div class="options">'+q.o.map((opt,i)=>`
    <button class="option-btn ${!state.answered?'':i===q.c?'correct':i===state.selected?'wrong':''}"
      data-opt="${i}" ${state.answered?'disabled':''}>
      <span class="key-hint">${i+1}</span><span>${opt}</span>
    </button>`).join('')+'</div>';
}

function renderMulti(q){
  const btns=q.o.map((opt,i)=>{
    let cls='multi-opt';
    if(q._sel.has(i))cls+=' selected';
    if(q._checked){
      const inC=q.correct.includes(i),sel=q._sel.has(i);
      if(inC&&sel)cls+=' correct';
      else if(!inC&&sel)cls+=' wrong';
      else if(inC&&!sel)cls+=' missed';
    }
    const chk=q._sel.has(i)?'✓':'';
    return `<button class="${cls}" data-multi="${i}" ${q._checked?'disabled':''}><span class="chk">${chk}</span><span>${opt}</span></button>`;
  }).join('');
  const verifyBtn=(!q._checked&&q._sel.size>0)?'<div><button class="btn-verify" id="btn-verify">Проверить</button></div>':'';
  return `<div class="multi-opts">${btns}</div>${verifyBtn}`;
}

function renderMatch(q){
  const pairAssign=Object.keys(q._p).map(Number);
  function pairColorIdx(ti){return pairAssign.indexOf(ti);}

  const termsH=q.pairs.map((pair,i)=>{
    const di=q._p[i];const paired=di!==undefined;
    const ci=pairColorIdx(i);const isActive=q._at===i;
    let style='';let badge='';
    if(paired&&!q._checked){
      style=`border-color:${PAIR_COLORS[ci%6]};background:${PAIR_BG[ci%6]};`;
      badge=`<span class="match-badge" style="background:${PAIR_COLORS[ci%6]}">${ci+1}</span>`;
    }
    if(q._checked){
      const ok=di===i;
      style=ok?'border-color:var(--correct);background:var(--cbg);':'border-color:var(--wrong);background:var(--wbg);';
      badge=ok?'<span style="font-size:1rem">✅</span>':'<span style="font-size:1rem">❌</span>';
    }
    return `<div class="match-term ${isActive?'active':''}" style="${style}" data-term="${i}">${pair.term} ${badge}</div>`;
  }).join('');

  const defsH=q._sd.map((origIdx,sp)=>{
    const pairedTi=Number(Object.keys(q._p).find(k=>q._p[k]===origIdx));
    const paired=!isNaN(pairedTi)&&q._p[pairedTi]===origIdx;
    const ci=pairColorIdx(pairedTi);
    let style='';let badge='';
    if(paired&&!q._checked){
      style=`border-color:${PAIR_COLORS[ci%6]};background:${PAIR_BG[ci%6]};`;
      badge=`<span class="match-badge" style="background:${PAIR_COLORS[ci%6]};margin-right:6px">${ci+1}</span>`;
    }
    if(q._checked&&paired){
      const ok=pairedTi===origIdx;
      style=ok?'border-color:var(--correct);background:var(--cbg);':'border-color:var(--wrong);background:var(--wbg);';
    }
    return `<div class="match-def" style="${style}" data-def="${sp}">${badge}${q.pairs[origIdx].def}</div>`;
  }).join('');

  const allPaired=Object.keys(q._p).length===q.pairs.length;
  const verifyBtn=(!q._checked&&allPaired)?'<div><button class="btn-verify" id="btn-verify">✓ Проверить</button></div>':'';
  const hint=q._at!==null?'<div class="match-hint">→ Теперь нажмите на определение</div>':
    !allPaired?'<div class="match-hint">Нажмите на термин, затем на его определение</div>':'';
  return `<div class="match-grid">
    <div class="match-col-h">Термины</div><div class="match-col-h">Определения</div>
    <div>${termsH}</div><div>${defsH}</div>
  </div>${hint}${verifyBtn}`;
}

function renderResult(){
  const tot=state.questions.length;
  const pct=Math.round(state.score/tot*100);
  const grade=pct>=90?'🏆 Отлично!':pct>=70?'👍 Хорошо!':pct>=50?'📖 Нужно повторить':'💪 Продолжай учить!';
  const tids=[...new Set(state.questions.map(q=>q.t))].sort();
  const tsRows=tids.map(tid=>{
    const tqs=state.questions.map((q,i)=>({q,i})).filter(x=>x.q.t===tid);
    const ws=new Set(state.wrong);
    const correct=tqs.filter(x=>!ws.has(x.i)).length;
    const p=Math.round(correct/tqs.length*100);
    const bc=p>=80?'good':p>=50?'ok':'bad';
    const label=Q.find(q=>q.t===tid)?.tf||tid;
    return `<div class="ts-row"><span class="ts-name">${label.replace(/^Тема \d+: /,'')}</span>
      <div class="ts-bar-wrap"><div class="ts-bar ${bc}" style="width:${p}%"></div></div>
      <span class="ts-pct">${correct}/${tqs.length}</span></div>`;
  }).join('');
  const wrongH=state.wrong.length?`<div class="wrong-list"><h3>❌ Ошибки (${state.wrong.length})</h3>
    ${state.wrong.map(i=>{
      const q=state.questions[i];
      if(!q.type||q.type==='single')return `<div class="wrong-item"><div class="wq">${q.q}</div><div class="wa">✓ ${q.o[q.c]}</div></div>`;
      if(q.type==='multi')return `<div class="wrong-item"><div class="wq">${q.q}</div><div class="wa">✓ ${q.correct.map(j=>q.o[j]).join(', ')}</div></div>`;
      if(q.type==='match')return `<div class="wrong-item"><div class="wq">${q.q}</div>
        ${q.pairs.map((p,j)=>q._p[j]!==j?`<div class="wb">✗ ${p.term} → ${q._p[j]!==undefined?q.pairs[q._p[j]].def:'(не выбрано)'}</div><div class="wa">✓ ${p.term} → ${p.def}</div>`:'').join('')}
      </div>`;
    }).join('')}</div>`:'';
  return `<div><div class="result-hero">
    <div class="result-score">${pct}%</div>
    <div class="result-lbl">${state.score} правильных из ${tot}</div>
    <div class="result-grade">${grade}</div>
    ${state.maxStreak>=3?`<div style="margin-top:8px;opacity:.85">🔥 Макс. серия: ${state.maxStreak}</div>`:''}
  </div>
  <div class="topic-stats"><h3>По темам</h3>${tsRows}</div>
  ${wrongH}
  <div class="result-actions">
    ${state.wrong.length>0?`<button class="btn-primary" id="btn-retry-end">🔄 Повторить ошибки</button>`:''}
    <button class="btn-secondary" id="btn-restart">⟳ Заново</button>
    <button class="btn-secondary" id="btn-home">🏠 Меню</button>
  </div></div>`;
}

function attachHandlers(){
  document.querySelectorAll('[data-topic]').forEach(b=>b.addEventListener('click',()=>{state.topicFilter=b.dataset.topic;render();}));
  document.getElementById('btn-start')?.addEventListener('click',()=>startQuiz(false));
  document.getElementById('btn-retry')?.addEventListener('click',()=>startQuiz(true));
  document.getElementById('btn-next')?.addEventListener('click',next);
  document.getElementById('btn-verify')?.addEventListener('click',()=>{
    const q=state.questions[state.qIndex];
    if(q.type==='multi')checkMulti();
    else if(q.type==='match')checkMatch();
  });
  document.getElementById('btn-retry-end')?.addEventListener('click',()=>startQuiz(true));
  document.getElementById('btn-restart')?.addEventListener('click',()=>startQuiz(false));
  document.getElementById('btn-home')?.addEventListener('click',()=>{state.screen='start';render();});
  document.querySelectorAll('.option-btn').forEach(b=>b.addEventListener('click',()=>answerSingle(parseInt(b.dataset.opt))));
  document.querySelectorAll('.multi-opt').forEach(b=>b.addEventListener('click',()=>toggleMulti(parseInt(b.dataset.multi))));
  document.querySelectorAll('.match-term').forEach(b=>b.addEventListener('click',()=>matchClickTerm(parseInt(b.dataset.term))));
  document.querySelectorAll('.match-def').forEach(b=>b.addEventListener('click',()=>matchClickDef(parseInt(b.dataset.def))));
}

document.addEventListener('keydown',e=>{
  if(state.screen!=='quiz')return;
  const q=state.questions[state.qIndex];
  if(!state.answered&&(!q.type||q.type==='single')&&['1','2','3','4'].includes(e.key)){
    answerSingle(parseInt(e.key)-1);
  }
  if(state.answered&&(e.key===' '||e.key==='Enter')){e.preventDefault();next();}
});

render();

</script>
</body>
</html>
